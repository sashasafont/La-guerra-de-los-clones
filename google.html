<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google</title>
    <link rel="stylesheet" href="./static/styles.css">
</head>

<body>
    <nav>
        <div class="nav_izquierda">
            <button>Sobre Google</button>
            <button>Tienda</button>
        </div>
        <div class="nav_derecha">
            <button>Gmail</button>
            <button>Imágenes</button>
            <button class="navbarimg">
                <img src="./static/IMG/apps_24dp_434343_FILL0_wght400_GRAD0_opsz24.png">
            </button>
            <button id="btnLogin">Iniciar sesión</button>
        </div>
    </nav>
    <header>
        <div class="header_logo">
            <div class="azul">
                <p>G</p>
            </div>
            <div class="rojo">
                <p>o</p>
            </div>
            <div class="amarillo">
                <p>o</p>
            </div>
            <div class="azul">
                <p>g</p>
            </div>
            <div class="verde">
                <p>l</p>
            </div>
            <div class="rojo">
                <p>e</p>
            </div>
        </div>
    </header>
    <main>
        <div class="buscador">
            <div class="main_bar">
                <input type="text">
                <button class="micbtn">
                    <img src="./static/IMG/google-mic-google-microphone-icon-axe-tool-symbol-text-transparent-png-2501316.png">
                </button>
            </div>
        </div>
        <div class="center">
            <button>Buscar con Google</button>
            <button>Voy a tener suerte</button>
        </div>
        <div class="idiomas">
            <p>Ofrecido por Google en:
                <span class="idioma_highlight">català</span>
                <span class="idioma_highlight">galego</span>
                <span class="idioma_highlight">euskara</span>
            </p>
        </div>
    </main>
    <footer>
        <div class="section_pais">
            <p>España</p>
        </div>
        <div class="section_final">
            <div class="button_group left">
                <button class="button_footer">Publicidad</button>
                <button class="button_footer">Empresa</button>
                <button class="button_footer">Cómo funciona la Búsqueda</button>
            </div>
            <p class="pointer">🍃 Tres décadas de acción climática: descubre lo que estamos haciendo</p>
            <div class="button_group right">
                <button class="button_footer">Privacidad</button>
                <button class="button_footer">Términos</button>
                <button class="button_footer">Configuración</button>
            </div>
        </div>
    </footer>
</body>

</html>
